# Oftware — WPPConnect central em Compute Engine (Docker Compose)
# Etapa 4.2 — imagem oficial + volumes persistentes em /data/wppconnect
#
# Estratégia Docker: usar wppconnect/wppconnect-server (oficial) em vez de compilar o repo.
# Ref: https://hub.docker.com/r/wppconnect/wppconnect-server

services:
  wppconnect:
    image: ${WPPCONNECT_IMAGE:-wppconnect/wppconnect-server:sha-2b71889}
    container_name: oftware-whatsapp-wppconnect
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "21465"
      WPP_PUBLIC_HOST: "http://localhost"
    ports:
      - "127.0.0.1:21465:21465"
    volumes:
      # Config Oftware em runtime (secretKey lê SECRET_KEY do .env)
      - ../wppconnect/config.runtime.js:/usr/src/wpp-server/dist/config.js:ro
      - /data/wppconnect/userDataDir:/usr/src/wpp-server/userDataDir
      - /data/wppconnect/tokens:/usr/src/wpp-server/tokens
      - /data/wppconnect/logs:/usr/src/wpp-server/log
    shm_size: "512mb"
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:21465/api-docs').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
